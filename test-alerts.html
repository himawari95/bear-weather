<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>天气提醒测试</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        .test-container {
            max-width: 600px;
            margin: 0 auto;
        }
        .weather-alert {
            background-color: #f0f8ff;
            border: 1px solid #ccc;
            border-radius: 8px;
            padding: 15px;
            margin: 10px 0;
        }
        .alert-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 5px;
        }
        .alert-text {
            font-size: 14px;
            margin-bottom: 5px;
        }
        .alert-subtitle {
            font-size: 12px;
            color: #666;
        }
        .test-buttons {
            margin-bottom: 20px;
        }
        button {
            margin: 5px;
            padding: 8px 15px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="test-container">
        <h1>天气提醒测试</h1>
        
        <div class="test-buttons">
            <button onclick="testAlert('01d')">晴天 (01d)</button>
            <button onclick="testAlert('01n')">晴天 (01n)</button>
            <button onclick="testAlert('02d')">少云 (02d)</button>
            <button onclick="testAlert('02n')">少云 (02n)</button>
            <button onclick="testAlert('03d')">多云 (03d)</button>
            <button onclick="testAlert('03n')">多云 (03n)</button>
            <button onclick="testAlert('04d')">阴天 (04d)</button>
            <button onclick="testAlert('04n')">阴天 (04n)</button>
            <button onclick="testAlert('09d')">小雨 (09d)</button>
            <button onclick="testAlert('09n')">小雨 (09n)</button>
            <button onclick="testAlert('10d')">中雨 (10d)</button>
            <button onclick="testAlert('10n')">中雨 (10n)</button>
            <button onclick="testAlert('11d')">雷雨 (11d)</button>
            <button onclick="testAlert('11n')">雷雨 (11n)</button>
            <button onclick="testAlert('13d')">雪天 (13d)</button>
            <button onclick="testAlert('13n')">雪天 (13n)</button>
            <button onclick="testAlert('50d')">雾天 (50d)</button>
            <button onclick="testAlert('50n')">雾天 (50n)</button>
        </div>
        
        <div class="weather-alert">
            <h2 class="alert-title" id="alertTitle"></h2>
            <p class="alert-text" id="alertText"></p>
            <div class="alert-subtitle" id="alertSubtitle"></div>
        </div>
    </div>
    
    <script src="script.js"></script>
    <script>
        // 重写updateWeatherAlert函数，直接使用页面元素
        function updateWeatherAlert(data) {
            const alertElement = document.querySelector('.weather-alert');
            const alertTitle = document.getElementById('alertTitle');
            const alertText = document.getElementById('alertText');
            const alertSubtitle = document.getElementById('alertSubtitle');
            
            // 获取当前语言
            const currentLanguage = document.documentElement.lang || 'zh';
            // 获取语言包中的天气提醒
            let alerts = {
                rainTitle: '雨天提醒',
                rainText: '今天有雨，记得带伞出门！',
                snowTitle: '雪天提醒：',
                snowText: '雪花飘落，路面易积雪结冰，出行注意防滑，驾车减速慢行！',
                hotTitle: '高温预警',
                hotText: '天气炎热，注意防暑降温！',
                clearTitle: '晴天提醒：',
                clearText: '阳光明媚，紫外线较强，外出建议做好防晒措施，适宜进行户外运动！',
                cloudyTitle: '多云天气',
                cloudyText: '今天多云，温度适宜！',
                thunderstormTitle: '雷雨提醒：',
                thunderstormText: '雷雨天气，伴有闪电和雷声，应远离高大物体，尽量待在室内安全区域！',
                partlyCloudyTitle: '少云提醒：',
                partlyCloudyText: '天空少云，光线充足，适合晾晒衣物或进行短途旅行！',
                scatteredCloudsTitle: '多云提醒：',
                scatteredCloudsText: '天空多云，气温适宜，可进行散步、野餐等轻户外活动！',
                brokenCloudsTitle: '阴天提醒：',
                brokenCloudsText: '天气阴沉，可能伴有微风，建议携带薄外套，室内活动更为适宜！',
                showerRainTitle: '小雨提醒：',
                showerRainText: '淅淅沥沥小雨，路面湿滑，出行请携带雨伞，注意交通安全！',
                moderateRainTitle: '中雨提醒：',
                moderateRainText: '雨势中等，建议减少不必要外出，如需出行请选择防水装备！',
                fogTitle: '雾天提醒',
                fogText: '大雾弥漫，能见度低，出行需开启雾灯，保持安全车距，谨慎驾驶！',
                defaultTitle: '天气提醒',
                defaultText: '今天天气：'
            };
            
            // 如果语言包已经初始化，使用语言包中的天气提醒
            if (LANGUAGE_PACK && LANGUAGE_PACK[currentLanguage] && LANGUAGE_PACK[currentLanguage].weatherAlerts) {
                alerts = LANGUAGE_PACK[currentLanguage].weatherAlerts;
            }
            
            const weatherMain = data.weather[0].main;
            const iconCode = data.weather[0].icon;
            const temp = Math.round(data.main.temp);
            
            // 首先检查天气图标是否为晴天图标（01d或01n）
            if (iconCode === '01d' || iconCode === '01n') {
                if (temp > 30) {
                    alertTitle.textContent = alerts.hotTitle;
                    alertText.textContent = alerts.hotText;
                    alertSubtitle.textContent = currentLanguage === 'zh' ? "天气炎热，注意防暑降温！" : "It's a hot sunny day.";
                } else {
                    alertTitle.textContent = alerts.clearTitle;
                    alertText.textContent = alerts.clearText;
                    alertSubtitle.textContent = currentLanguage === 'zh' ? "阳光明媚，紫外线较强，外出建议做好防晒措施，适宜进行户外运动！" : "It's a clear day with strong UV rays, remember to apply sunscreen and enjoy outdoor activities!";
                }
            } 
            // 检查是否为少云图标（02d或02n）
            else if (iconCode === '02d' || iconCode === '02n') {
                alertTitle.textContent = alerts.partlyCloudyTitle;
                alertText.textContent = alerts.partlyCloudyText;
                alertSubtitle.textContent = currentLanguage === 'zh' ? "天空少云，光线充足，适合晾晒衣物或进行短途旅行！" : "It's a partly cloudy day with plenty of sunlight.";
            }
            // 检查是否为多云图标（03d或03n）
            else if (iconCode === '03d' || iconCode === '03n') {
                alertTitle.textContent = alerts.scatteredCloudsTitle;
                alertText.textContent = alerts.scatteredCloudsText;
                alertSubtitle.textContent = currentLanguage === 'zh' ? "天空多云，气温适宜，可进行散步、野餐等轻户外活动！" : "It's a cloudy day with comfortable temperatures.";
            }
            // 检查是否为阴天图标（04d或04n）
            else if (iconCode === '04d' || iconCode === '04n') {
                alertTitle.textContent = alerts.brokenCloudsTitle;
                alertText.textContent = alerts.brokenCloudsText;
                alertSubtitle.textContent = currentLanguage === 'zh' ? "天气阴沉，可能伴有微风，建议携带薄外套，室内活动更为适宜！" : "It's an overcast day with possible breeze.";
            }
            // 检查是否为小雨图标（09d或09n）
            else if (iconCode === '09d' || iconCode === '09n') {
                alertTitle.textContent = alerts.showerRainTitle;
                alertText.textContent = alerts.showerRainText;
                alertSubtitle.textContent = currentLanguage === 'zh' ? "淅淅沥沥小雨，路面湿滑，出行请携带雨伞，注意交通安全！" : "It's a light rain, the road is slippery.";
            }
            // 检查是否为中雨图标（10d或10n）
            else if (iconCode === '10d' || iconCode === '10n') {
                alertTitle.textContent = alerts.moderateRainTitle;
                alertText.textContent = alerts.moderateRainText;
                alertSubtitle.textContent = currentLanguage === 'zh' ? "雨势中等，建议减少不必要外出，如需出行请选择防水装备！" : "It's a moderate rain, reduce unnecessary outings.";
            }
            // 检查是否为雷雨图标（11d或11n）
            else if (iconCode === '11d' || iconCode === '11n') {
                alertTitle.textContent = alerts.thunderstormTitle;
                alertText.textContent = alerts.thunderstormText;
                alertSubtitle.textContent = currentLanguage === 'zh' ? "雷雨天气，伴有闪电和雷声，应远离高大物体，尽量待在室内安全区域！" : "It's a thunderstorm with lightning and thunder, stay away from tall objects and stay indoors in a safe area!";
            }
            // 检查是否为雪天图标（13d或13n）
            else if (iconCode === '13d' || iconCode === '13n') {
                alertTitle.textContent = alerts.snowTitle;
                alertText.textContent = alerts.snowText;
                alertSubtitle.textContent = currentLanguage === 'zh' ? "雪花飘落，路面易积雪结冰，出行注意防滑，驾车减速慢行！" : "It's snowing, the road is prone to snow and ice, be careful of slipping and drive slowly!";
            }
            // 检查是否为雾天图标（50d或50n）
            else if (iconCode === '50d' || iconCode === '50n') {
                alertTitle.textContent = alerts.fogTitle;
                alertText.textContent = alerts.fogText;
                alertSubtitle.textContent = currentLanguage === 'zh' ? "大雾弥漫，能见度低，出行需开启雾灯，保持安全车距，谨慎驾驶！" : "It's foggy with low visibility, turn on fog lights, keep a safe distance and drive carefully!";
            }
            else {
                // 其他天气类型的处理保持不变
                switch (weatherMain) {
                    case 'Rain':
                        alertTitle.textContent = alerts.rainTitle;
                        alertText.textContent = alerts.rainText;
                        alertSubtitle.textContent = currentLanguage === 'zh' ? "今天有雨，记得带伞出门！" : "It's a rainy day.";
                        break;
                    case 'Snow':
                        // 这种情况理论上不会发生，因为前面已经处理了雪天图标
                        alertTitle.textContent = alerts.snowTitle;
                        alertText.textContent = alerts.snowText;
                        alertSubtitle.textContent = currentLanguage === 'zh' ? "雪花飘落，路面易积雪结冰，出行注意防滑，驾车减速慢行！" : "It's snowing, the road is prone to snow and ice, be careful of slipping and drive slowly!";
                        break;
                    case 'Clear':
                        // 这种情况理论上不会发生，因为前面已经处理了晴天图标
                        alertTitle.textContent = alerts.clearTitle;
                        alertText.textContent = alerts.clearText;
                        alertSubtitle.textContent = currentLanguage === 'zh' ? "阳光明媚，紫外线较强，外出建议做好防晒措施，适宜进行户外运动！" : "It's a clear day with strong UV rays, remember to apply sunscreen and enjoy outdoor activities!";
                        break;
                    case 'Clouds':
                        alertTitle.textContent = alerts.cloudyTitle;
                        alertText.textContent = alerts.cloudyText;
                        alertSubtitle.textContent = currentLanguage === 'zh' ? "今天多云，温度适宜！" : "It's a cloudy day.";
                        break;
                    case 'Thunderstorm':
                        // 这种情况理论上不会发生，因为前面已经处理了雷雨图标
                        alertTitle.textContent = alerts.thunderstormTitle;
                        alertText.textContent = alerts.thunderstormText;
                        alertSubtitle.textContent = currentLanguage === 'zh' ? "雷雨天气，伴有闪电和雷声，应远离高大物体，尽量待在室内安全区域！" : "It's a thunderstorm with lightning and thunder, stay away from tall objects and stay indoors in a safe area!";
                        break;
                    default:
                        alertTitle.textContent = alerts.defaultTitle;
                        alertText.textContent = alerts.defaultText + data.weather[0].description;
                        alertSubtitle.textContent = currentLanguage === 'zh' ? `天气：${data.weather[0].description}` : `Weather: ${data.weather[0].main}`;
                }
            }
        }
        
        function testAlert(iconCode) {
            // 初始化语言包
            initLanguagePack();
            
            // 根据图标代码确定天气类型
            let weatherMain;
            if (iconCode.startsWith('01')) {
                weatherMain = 'Clear';
            } else if (iconCode.startsWith('02') || iconCode.startsWith('03') || iconCode.startsWith('04')) {
                weatherMain = 'Clouds';
            } else if (iconCode.startsWith('09') || iconCode.startsWith('10')) {
                weatherMain = 'Rain';
            } else if (iconCode.startsWith('11')) {
                weatherMain = 'Thunderstorm';
            } else if (iconCode.startsWith('13')) {
                weatherMain = 'Snow';
            } else if (iconCode.startsWith('50')) {
                weatherMain = 'Atmosphere';
            } else {
                weatherMain = 'Clear';
            }
            
            // 模拟天气数据
            const weatherData = {
                weather: [{
                    main: weatherMain,
                    description: weatherMain.toLowerCase(),
                    icon: iconCode
                }],
                main: {
                    temp: 25
                }
            };
            
            // 调用更新天气提醒函数
            updateWeatherAlert(weatherData);
        }
    </script>
</body>
</html>
